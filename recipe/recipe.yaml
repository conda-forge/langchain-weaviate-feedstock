schema_version: 1

context:
  version: "0.0.8"

package:
  name: langchain-weaviate
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-weaviate/langchain_weaviate-${{ version }}.tar.gz
  sha256: cdea3762f40e9b40c3cd7173f19ffda4c6806849fdfe86c53bfa72a2d3d9ac80

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - langchain-core >=1.4.7,<2.0
    - weaviate-client >=4.0.0,<5.0.0
    - numpy >=1.26.2,<3.0

tests:
  - python:
      imports:
        - langchain_weaviate
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://pypi.org/project/langchain-weaviate/
  license: MIT
  license_file: LICENSE
  summary: An integration package connecting Weaviate and LangChain
  repository: https://github.com/langchain-ai/langchain-weaviate
  description: |
    langchain-weaviate is the LangChain integration package for Weaviate,
    the open-source vector database. It provides a Weaviate-backed vector
    store implementation for LangChain, enabling similarity search,
    retrieval, and embedding storage against a Weaviate instance.

extra:
  recipe-maintainers:
    - pb01ka
